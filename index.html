<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>戴聖宴面試個人網站</title>
    <link rel="icon" type="image/png" href="public/images/favicon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="src/css/base.css" />
    <link rel="stylesheet" href="src/css/layout.css" />
    <link rel="stylesheet" href="src/css/components.css" />
  </head>

  <body id="top">
    <header class="site-header">
      <div class="container header-container">
        <a class="home-link" href="index.html" aria-label="回到首頁">
          <span class="home-icon" aria-hidden="true">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              focusable="false"
            >
              <path d="M3 11L12 3l9 8"></path>
              <path d="M5 10v10h14V10"></path>
              <path d="M9 20v-6h6v6"></path>
            </svg>
          </span>
        </a>

        <button
          class="nav-toggle"
          type="button"
          aria-label="開啟選單"
          aria-expanded="false"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav class="site-nav" aria-label="主要導覽列">
          <a href="index.html#about">自我介紹</a>
          <a href="index.html#projects">作品集</a>
          <a href="index.html#school-projects">修課筆記與專題</a>
          <a href="index.html#education">教育與工作經歷</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero-section">
        <div class="container hero-container">
          <div class="hero-content">
            <h1 id="profile-name"></h1>

            <p class="hero-description" id="profile-description"></p>

            <div class="hero-actions">
              <a
                class="button button-primary"
                id="profile-resume"
                href="public/dsy_resume.pdf"
                download
              >
                點擊下載我的履歷
              </a>
            </div>

            <div
              class="hero-links"
              id="profile-links"
              aria-label="履歷與社群連結"
            ></div>
          </div>
        </div>
      </section>

      <section id="about" class="section">
        <div class="container">
          <div class="section-heading"><h2>自我介紹</h2></div>
              <div class="about-layout">
                <div class="about-text">
                  <div id="about-content"></div>

                  <div class="about-actions">
                    <a
                      class="button button-primary"
                      id="profile-transcript"
                      href="public/dsy_transcript.pdf"
                      download
                    >
                      點擊下載我的成績單
                    </a>
                  </div>
                </div>

                <div class="about-image-wrapper">
                  <img
                    class="about-image"
                    id="about-avatar"
                    src="public/images/me.png"
                    alt="大頭照"
                  />
                </div>
              </div>
          </div>
        </div>
      </section>

      <section id="projects" class="section section-muted">
        <div class="container">
          <div class="section-heading">
            <h2>作品集</h2>
          </div>

          <div class="project-list" id="project-list"></div>
        </div>
      </section>

      <section id="school-projects" class="section">
        <div class="container">
          <div class="section-heading">
            <h2>修課筆記與專題</h2>
          </div>

          <div class="card-grid card-grid-two" id="school-project-list"></div>
        </div>

        <div class="section-link-wrapper">
          <a class="section-more-link" href="school-projects.html">
            點此查看所有修課專題
          </a>
        </div>
      </section>

      <section id="education" class="section section-muted">
        <div class="container">
          <div class="section-heading">
            <h2>教育與工作經歷</h2>
          </div>

          <div class="experience-tabs">
            <div
              class="experience-tab-list"
              id="experience-tab-list"
              role="tablist"
              aria-label="教育與工作經歷列表"
            ></div>

            <div class="experience-content" id="experience-content"></div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-container">
        <a class="back-to-top" href="#top">Back to top ↑</a>
      </div>
    </footer>

    <script src="src/data/profile.js"></script>
    <script src="src/data/about.js"></script>
    <script src="src/data/projects.js"></script>
    <script src="src/data/school-projects.js"></script>
    <script src="src/data/experience.js"></script>

    <script src="src/js/icons.js"></script>
    <script src="src/js/render-profile.js"></script>
    <script src="src/js/render-about.js"></script>
    <script src="src/js/render-projects.js"></script>
    <script src="src/js/render-school-projects.js"></script>
    <script src="src/js/render-experience.js"></script>
    <script src="src/js/main.js"></script>
  </body>
</html>
